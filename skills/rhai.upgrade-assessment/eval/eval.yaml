name: rhai-upgrade-assessment-eval
description: Evaluate RHOAI upgrade assessment quality — engineer persona

skill: rhai.upgrade-assessment

execution:
  mode: case
  arguments: "--source {source} --target {target} --scope {scope} --personas {personas}"
  timeout: 3600
  max_budget_usd: 10.0

runner:
  type: claude-code
  effort: high

models:
  skill: claude-opus-4-6
  subagent: claude-opus-4-6
  judge: claude-opus-4-6

permissions:
  allow: []
  deny:
    - "mcp__*"

dataset:
  path: eval/dataset/cases
  schema: |
    Each case is an RHOAI version transition to assess.
    - input.yaml: source (RHOAI version), target (RHOAI version), scope (static|runtime), personas (comma-separated list)
    No reference.md for baseline runs.

outputs:
  - path: .context/tmp/upgrade-assessments
    schema: |
      Run directory named {source}-to-{target}-{timestamp}/ containing:
      - context.md: shared context built by context-builder (CRD inventory, deployment inventory, interaction map, etc.)
      - discrepancies.yaml: architecture doc vs actual code mismatches
      - engineer.md: engineer persona assessment output
      - engineer.yaml: structured metadata sidecar (findings, xrefs, risk)
      - synthesis.yaml: pre-computed tables and cross-persona analysis
      - report.md: synthesized final report with verdict table
      - state.yaml: run state persistence

traces:
  stdout: true
  stderr: true
  events: false
  metrics: true

judges:
  - name: context_completeness
    description: All required sections present in context.md
    check: |
      files = outputs.get("files", {})
      context = next((v for k, v in files.items() if k.endswith("context.md")), "")
      if not context:
        return False, "context.md not found in collected artifacts"
      required = [
        "CRD Inventory", "Deployment Inventory", "Source Map",
        "Endpoint Inventory", "Webhook Inventory", "Workload Type Inventory",
        "PVC and Storage", "Dependency Operator Inventory",
        "Cross-Component Interaction Map", "Potential Accidental Restart Triggers",
        "Persona Routing and Finding Ownership", "Reference Paths"
      ]
      missing = [s for s in required if s not in context]
      if missing:
        return False, f"Missing sections: {missing}"
      return True, f"All {len(required)} required sections present"

  - name: engineer_output_exists
    description: Engineer persona produced output file
    check: |
      files = outputs.get("files", {})
      found = any("engineer.md" in k for k in files)
      return found, "engineer.md found" if found else "engineer.md MISSING — persona did not produce output"

  - name: report_exists
    description: Synthesized report was produced
    check: |
      files = outputs.get("files", {})
      found = any("report.md" in k for k in files)
      return found, "report.md found" if found else "report.md MISSING — synthesis step failed"

  - name: finding_quality
    description: Are engineer findings evidence-grounded and correctly scoped?
    prompt: |
      Evaluate the engineer persona output from an RHOAI upgrade assessment.

      Score 1-5 where 5 is excellent. Check these criteria:

      1. **Evidence grounding**: Does every numbered finding cite a specific file path
         using `repo: <name>, branch: <branch>, path: <path>` format? Findings that
         cite "context.md" as a source are WRONG (it's a synthesized artifact).

      2. **Ownership compliance**: Does the engineer stay within their domain?
         Engineer owns: CRD schema/API changes, restart root-cause analysis,
         migration tooling gaps, cross-component API impact, auth/Gateway API shifts.
         Engineer should XREF (not full findings) for: pod restart disruption (SRE),
         component topology (Architect), dependency operators (Admin).

      3. **Completeness**: Does the CRD Change Matrix cover CRDs from the context?
         Are there "N resources assessed with no impact — omitted" lines?

      4. **Confidence tags**: Does every finding have a Confidence tag (high/medium/low)
         with appropriate justification?

      5. **Actionability**: Are mitigations concrete and verified from source code,
         not "verify post-upgrade" when the evidence is in the repos?

      ## Outputs to evaluate

      {{ outputs }}

  - name: false_positive_check
    description: Flag speculative or fabricated claims
    prompt: |
      Review the engineer persona output for false positives and fabricated claims.

      Score 1-5 where 5 = no false positives, 1 = multiple fabricated claims.

      Red flags specific to RHOAI:
      - Claims about "admin-ack mechanisms" (not implemented in current RHOAI)
      - Rollback procedures (RHOAI is fix-forward only)
      - "OLM updates component X" (only rhods-operator is OLM-managed; all
        sub-components are deployed by rhods-operator via kustomize)
      - Data-plane restart claims without a traced mechanism (must identify the
        specific code path that changes the pod template)
      - New opt-in components flagged as upgrade risks (they have no pre-existing state)
      - Controller-managed CRDs rated as data-loss risks (controllers recreate them)
      - cert-manager flagged as webhook TLS dependency (RHOAI uses OpenShift service-ca)
      - Speculative RBAC impacts without evidence of a consumer needing changes

      ## Outputs to evaluate

      {{ outputs }}

  - name: metadata_quality
    description: Engineer persona produced valid structured metadata
    check: |
      files = outputs.get("files", {})
      yaml_file = next((v for k, v in files.items() if k.endswith("engineer.yaml")), "")
      if not yaml_file:
        return False, "engineer.yaml not found"
      import yaml as y
      try:
        data = y.safe_load(yaml_file)
      except Exception as e:
        return False, f"invalid YAML: {e}"
      if not isinstance(data, dict) or "persona" not in data:
        return False, "missing required field: persona"
      if data.get("inapplicable", False):
        return True, "valid inapplicable metadata"
      required = ["risk_level", "recommendation", "findings"]
      missing = [f for f in required if f not in data]
      if missing:
        return False, f"missing fields: {missing}"
      if not isinstance(data.get("findings", []), list):
        return False, "findings is not a list"
      return True, f"valid metadata with {len(data.get('findings', []))} findings"

  - name: ownership_boundaries
    description: Does engineer respect the XREF protocol?
    prompt: |
      Check whether the engineer persona respects finding ownership boundaries.

      Score 1-5 where 5 = perfect ownership discipline.

      Check:
      1. Does the output have a dedicated "## Cross-References" section with XREF entries?
      2. Are XREFs formatted as: **[XREF]** topic="..." owner="..." concern="..." severity-hint="..."?
      3. Are there full findings (not XREFs) for topics owned by other personas?
         - Pod restart disruption windows → SRE owns this
         - Component removal topology → Architect owns this
         - OLM path / backup / prerequisites → Admin owns this
         - Resource quotas → Architect owns this
      4. When engineer does XREF, does the concern add something the owning persona
         would not cover (different failure mode, different affected system)?

      ## Outputs to evaluate

      {{ outputs }}

thresholds:
  context_completeness:
    min_pass_rate: 1.0
  engineer_output_exists:
    min_pass_rate: 1.0
  report_exists:
    min_pass_rate: 1.0
  finding_quality:
    min_mean: 3.0
  false_positive_check:
    min_mean: 3.0
  metadata_quality:
    min_pass_rate: 1.0
  ownership_boundaries:
    min_mean: 3.0
